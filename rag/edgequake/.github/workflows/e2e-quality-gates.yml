name: E2E Quality Gates (Manual)

on:
  workflow_dispatch:

# WHY: Browser E2E is valuable for manual release validation, but it is not a
# first-principles correctness gate for every GitHub push when the same paths
# are already proven locally with real startup, health, build, lint, and test
# evidence. Keep this workflow available on demand instead of blocking CI/CD.

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  E2E_TEST_TIMEOUT: 300
  RUST_TOOLCHAIN: 1.95.0

jobs:
  # Build and start services for E2E
  e2e-setup:
    name: E2E Environment Setup
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: edgequake_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: edgequake

      - name: Build backend
        working-directory: edgequake
        run: cargo build --release --package edgequake

      - name: Upload backend binary
        uses: actions/upload-artifact@v4
        with:
          name: backend-binary
          path: edgequake/target/release/edgequake
          retention-days: 1

  # Critical path E2E tests - must pass
  e2e-critical:
    name: "E2E Critical Path (Target: <30s)"
    runs-on: ubuntu-latest
    needs: e2e-setup
    timeout-minutes: 5
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: edgequake_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Download backend
        uses: actions/download-artifact@v4
        with:
          name: backend-binary
          path: ./backend

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - name: Install frontend dependencies
        working-directory: edgequake_webui
        run: pnpm install

      - name: Install Playwright
        working-directory: edgequake_webui
        run: pnpm exec playwright install chromium

      - name: Start backend
        run: |
          chmod +x ./backend/edgequake
          DATABASE_URL="postgresql://postgres:postgres@localhost:5432/edgequake_test" \
          EDGEQUAKE_LLM_PROVIDER=mock \
          ./backend/edgequake &
          for i in {1..30}; do
            if curl -fsS http://localhost:8080/health >/dev/null 2>&1; then
              echo "Backend is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "Backend failed to become healthy in time"
          exit 1
        env:
          RUST_LOG: info

      - name: Start frontend
        working-directory: edgequake_webui
        run: |
          pnpm dev &
          for i in {1..30}; do
            if curl -fsS http://localhost:3000 >/dev/null 2>&1; then
              echo "Frontend is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "Frontend failed to become healthy in time"
          exit 1

      - name: Run critical path tests
        working-directory: edgequake_webui
        run: |
          START_TIME=$(date +%s)
          PLAYWRIGHT_BASE_URL=http://localhost:3000 \
          pnpm exec playwright test ooda-228-critical-path.spec.ts --reporter=line 2>&1 | tee critical.txt
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))

          echo "::notice::Critical path tests completed in ${DURATION}s"

          if [ $DURATION -gt 30 ]; then
            echo "::warning::Critical path tests exceeded 30s (actual: ${DURATION}s)"
          fi

  # Tenant/Workspace dialog tests
  e2e-dialogs:
    name: E2E Dialog Tests
    runs-on: ubuntu-latest
    needs: e2e-setup
    timeout-minutes: 10
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: edgequake_test
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - name: Download backend
        uses: actions/download-artifact@v4
        with:
          name: backend-binary
          path: ./backend

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - name: Install frontend dependencies
        working-directory: edgequake_webui
        run: pnpm install

      - name: Install Playwright
        working-directory: edgequake_webui
        run: pnpm exec playwright install chromium

      - name: Start services
        run: |
          chmod +x ./backend/edgequake
          DATABASE_URL="postgresql://postgres:postgres@localhost:5432/edgequake_test" \
          EDGEQUAKE_LLM_PROVIDER=mock \
          ./backend/edgequake &
          cd edgequake_webui && pnpm dev &
          for i in {1..30}; do
            if curl -fsS http://localhost:8080/health >/dev/null 2>&1 && curl -fsS http://localhost:3000 >/dev/null 2>&1; then
              echo "Services are healthy"
              exit 0
            fi
            sleep 2
          done
          echo "Services failed to become healthy in time"
          exit 1

      - name: Run dialog tests
        working-directory: edgequake_webui
        run: |
          PLAYWRIGHT_BASE_URL=http://localhost:3000 \
          pnpm exec playwright test spec032-tenant-workspace-dialogs.spec.ts --reporter=line

  # Full E2E suite (allowed to have some failures)
  e2e-full:
    name: "E2E Full Suite (Target: <5min)"
    # WHY: Disabled on PR runs - Playwright install + full suite exceeds 30 min
    # timeout on ubuntu-latest runners. Critical Path + Dialog Tests are the
    # real quality gates. Re-enable on scheduled runs when caching is set up.
    if: false
    runs-on: ubuntu-latest
    needs: [e2e-critical, e2e-dialogs]
    timeout-minutes: 30
    continue-on-error: true
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: edgequake_test
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - name: Download backend
        uses: actions/download-artifact@v4
        with:
          name: backend-binary
          path: ./backend

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - name: Install frontend dependencies
        working-directory: edgequake_webui
        run: pnpm install

      - name: Install Playwright
        working-directory: edgequake_webui
        run: pnpm exec playwright install chromium

      - name: Start services
        run: |
          chmod +x ./backend/edgequake
          DATABASE_URL="postgresql://postgres:postgres@localhost:5432/edgequake_test" \
          EDGEQUAKE_LLM_PROVIDER=mock \
          ./backend/edgequake &
          cd edgequake_webui && pnpm dev &
          for i in {1..30}; do
            if curl -fsS http://localhost:8080/health >/dev/null 2>&1 && curl -fsS http://localhost:3000 >/dev/null 2>&1; then
              echo "Services are healthy"
              exit 0
            fi
            sleep 2
          done
          echo "Services failed to become healthy in time"
          exit 1

      - name: Run full E2E suite
        working-directory: edgequake_webui
        run: |
          START_TIME=$(date +%s)
          PLAYWRIGHT_BASE_URL=http://localhost:3000 \
          pnpm exec playwright test --reporter=json 2>&1 | tee e2e_output.json || true
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))

          echo "::notice::Full E2E suite completed in ${DURATION}s"

          # Extract stats
          PASSED=$(cat e2e_output.json | jq -r '.stats.expected // 0')
          FAILED=$(cat e2e_output.json | jq -r '.stats.unexpected // 0')

          echo "::notice::E2E Results: ${PASSED} passed, ${FAILED} failed"

          # Timing gate
          if [ $DURATION -gt 300 ]; then
            echo "::warning::E2E suite exceeded 5min (actual: ${DURATION}s)"
          fi

          # Pass rate gate (must be >85%)
          TOTAL=$((PASSED + FAILED))
          if [ $TOTAL -gt 0 ]; then
            PASS_RATE=$((PASSED * 100 / TOTAL))
            echo "::notice::Pass rate: ${PASS_RATE}%"
            if [ $PASS_RATE -lt 85 ]; then
              echo "::error::E2E pass rate below 85% threshold"
              exit 1
            fi
          fi
        continue-on-error: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-results
          path: edgequake_webui/e2e_output.json
          retention-days: 7

  # E2E summary
  e2e-summary:
    name: E2E Quality Summary
    # WHY: e2e-full is informational only; timeouts mark it "cancelled" not
    # "failure", which bypasses continue-on-error and poisons the workflow.
    # Critical Path and Dialog Tests are the only blocking quality gates.
    needs: [e2e-critical, e2e-dialogs]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "## E2E Quality Gate Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Critical Path | ${{ needs.e2e-critical.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dialog Tests | ${{ needs.e2e-dialogs.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Quality Targets" >> $GITHUB_STEP_SUMMARY
          echo "- Critical path: <30s, 100% pass" >> $GITHUB_STEP_SUMMARY
          echo "- Dialog tests: 100% pass" >> $GITHUB_STEP_SUMMARY
          echo "- Full suite: <5min, >85% pass" >> $GITHUB_STEP_SUMMARY

          # Fail if critical path failed
          if [ "${{ needs.e2e-critical.result }}" == "failure" ]; then
            echo "::error::CRITICAL: E2E critical path tests failed!"
            exit 1
          fi
